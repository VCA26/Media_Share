name: Build and deploy Node.js app to Azure Web App - mediasharepro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Prepare Package
        run: |
          # 1. Create a clean folder
          mkdir -p output
          
          # 2. Copy standalone server files
          cp -r .next/standalone/. output/
          
          # 3. Copy static assets and public folder
          mkdir -p output/.next/static
          cp -r .next/static/. output/.next/static/
          cp -r public output/public

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: output
          include-hidden-files: true # ✅ Required for .next folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy-package

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mediasharepro'
          slot-name: 'Production'
          package: ./deploy-package # ✅ Only deploys production build contents
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EF707BA29C3B49098E5F1436888FE7DC }}
